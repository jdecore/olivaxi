<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <defs>
    <!-- Gradiente oliva oscura -->
    <linearGradient id="oliveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5D6B35"/>
      <stop offset="50%" stop-color="#4A5628"/>
      <stop offset="100%" stop-color="#3A4220"/>
    </linearGradient>
    <!-- Gradiente hoja -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A4D44A"/>
      <stop offset="40%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#5D8A2F"/>
    </linearGradient>
    <!-- Sombra suave -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#1C1C1C" flood-opacity="0.25"/>
    </filter>
    <!-- Brillo aceituna -->
    <radialGradient id="oliveShine" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Icono O con oliva -->
  <g filter="url(#dropShadow)">
    <!-- Circulo exterior -->
    <circle cx="48" cy="45" r="38" fill="#DCEE4A"/>
    
    <!-- Aceituna -->
    <ellipse cx="48" cy="50" rx="15" ry="18" fill="url(#oliveGrad)"/>
    <!-- Brillo aceituna -->
    <ellipse cx="42" cy="44" rx="5" ry="6" fill="url(#oliveShine)"/>
    
    <!-- Tallo curvado -->
    <path d="M48 32 Q54 26 60 29" stroke="#4A5628" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Hoja con nervio -->
    <path d="M58 27 Q70 18 78 26 Q70 33 58 27 Z" fill="url(#leafGrad)"/>
    <path d="M58 27 Q68 27 78 26" stroke="#4A7A28" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Texto Olivaξ -->
  <g filter="url(#dropShadow)">
    <!-- Oliva en negro oscuro -->
    <text x="95" y="58" font-family="'Outfit', 'Segoe UI', Helvetica, Arial, sans-serif" 
          font-size="44" font-weight="800" fill="#1C1C1C" letter-spacing="-2">Oliva</text>
    
    <!-- ξ en amarillo brillante -->
    <text x="248" y="58" font-family="'Outfit', 'Segoe UI', Helvetica, Arial, sans-serif" 
          font-size="46" font-weight="800" fill="#DCEE4A">ξ</text>
  </g>
</svg>