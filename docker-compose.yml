services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-}
        PUBLIC_API_PORT: ${API_PUBLIC_PORT:-3001}
    container_name: olivaxi-web
    ports:
      - "4321:4321"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: olivaxi-api
    ports:
      - "${API_PUBLIC_PORT:-3001}:3000"
    volumes:
      - ./oliva-api/olivaxi.db:/app/olivaxi.db
    environment:
      - GROQ_KEY=${GROQ_KEY}
      - GEMINI_KEY=${GEMINI_KEY}
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - ALERTAS_AUDIT_KEY=${ALERTAS_AUDIT_KEY:-changeme}
      - ALERTAS_CHECK_KEY=${ALERTAS_CHECK_KEY:-changeme}
    restart: unless-stopped
