services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "3000:3000"
    volumes:
      - ./oliva-api/olivaxi.db:/app/olivaxi.db
    environment:
      - GROQ_KEY=${GROQ_KEY}
      - GEMINI_KEY=${GEMINI_KEY}
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - ALERTAS_AUDIT_KEY=${ALERTAS_AUDIT_KEY:-changeme}
      - ALERTAS_CHECK_KEY=${ALERTAS_CHECK_KEY:-changeme}
    restart: unless-stopped