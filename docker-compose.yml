services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: http://45.90.237.135:3001
    ports:
      - "8080:4321"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./api/olivaxi.db:/app/olivaxi.db
    env_file:
      - ./api/.env
    restart: unless-stopped