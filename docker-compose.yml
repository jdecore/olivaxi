services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: https://api.olivaxi.duckdns.org
    ports:
      - "8080:4321"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./api/olivaxi.db:/app/olivaxi.db
    environment:
      - GROQ_KEY=${GROQ_KEY}
      - GEMINI_KEY=${GEMINI_KEY}
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
    restart: unless-stopped